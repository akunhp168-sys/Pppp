<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>LinkTree · Premium Style</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a; /* hitam solid premium */
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* card utama — hitam dengan sentuhan emas */
    .linktree-card {
      max-width: 480px;
      width: 100%;
      background: #000000;
      border-radius: 2rem;
      padding: 2rem 1.8rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.2);
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    /* logo bulat di tengah - style premium */
    .logo-circle {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .avatar-link {
      display: block;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #FFD700, #B8860B);
      border-radius: 50%;
      padding: 3px;
      transition: transform 0.2s ease;
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
    }

    .avatar-link:hover {
      transform: scale(1.02);
    }

    .avatar-inner {
      background: #0a0a0a;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* logo bintang / crown biar kelihatan premium */
    .avatar-inner i {
      font-size: 3rem;
      color: #FFD700;
      filter: drop-shadow(0 2px 6px rgba(255, 215, 0, 0.5));
    }

    /* nama & tagline */
    .display-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #FFD700;
      letter-spacing: 1px;
      margin-top: 0.3rem;
      margin-bottom: 0.2rem;
    }

    .bio {
      color: #aaaaaa;
      font-size: 0.75rem;
      letter-spacing: 1px;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      display: inline-block;
      padding-bottom: 6px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* container link - simpel dan rapi */
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin: 1.5rem 0 1.2rem;
    }

    /* tombol link - minimalis dengan border emas tipis */
    .social-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111111;
      padding: 0.85rem 1.5rem;
      border-radius: 3rem;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    .social-link:hover {
      background: #1a1a1a;
      border-color: #FFD700;
      transform: translateY(-2px);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .link-left i {
      font-size: 1.5rem;
      width: 1.8rem;
      text-align: center;
    }

    .platform-name {
      font-weight: 500;
      font-size: 1rem;
      color: #e0e0e0;
      letter-spacing: 0.3px;
    }

    .arrow-icon {
      color: #FFD700;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .social-link:hover .arrow-icon {
      opacity: 1;
      transform: translateX(3px);
    }

    /* warna ikon biar konsisten - emas/hitam, tapi ikon tetap khas */
    .social-link .link-left i { 
      color: #FFD700; 
    }
    
    /* efek hover ikon */
    .social-link:hover .link-left i {
      filter: drop-shadow(0 0 3px #FFD700);
    }

    /* footer kecil */
    .footer-note {
      font-size: 0.65rem;
      margin-top: 1.5rem;
      color: #555555;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      text-transform: uppercase;
    }

    .footer-note i {
      color: #FFD700;
      margin-right: 4px;
    }

    /* responsive */
    @media (max-width: 480px) {
      .linktree-card {
        padding: 1.5rem 1.2rem 2rem;
        border-radius: 1.5rem;
      }
      .avatar-link {
        width: 80px;
        height: 80px;
      }
      .avatar-inner i {
        font-size: 2.4rem;
      }
      .display-name {
        font-size: 1.3rem;
      }
      .platform-name {
        font-size: 0.9rem;
      }
      .social-link {
        padding: 0.7rem 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="linktree-card">
  <!-- Logo bulat tengah (premium) -->
  <div class="logo-circle">
    <div class="avatar-link">
      <div class="avatar-inner">
        <i class="fas fa-crown"></i> <!-- logo mahkota mewah -->
      </div>
    </div>
  </div>
  
  <!-- Nama / brand -->
  <div class="display-name">SKYPEE</div>
  <div class="bio">PREMIUM · UNLOCK YOUR PREMIUM LIFE</div>
  
  <!-- Daftar link sosial media: wa, tiktok, ig, tele, dll -->
  <div class="links-container">
    
    <!-- WhatsApp -->
    <a href="https://wa.me/62895808687890?text=Halo%20saya%20Ingin%20Order" target="_blank" rel="noopener noreferrer" class="social-link">
      <div class="link-left">
        <i class="fab fa-whatsapp"></i>
        <span class="platform-name">WhatsApp</span>
      </div>
      <div class="arrow-icon"><i class="fas fa-chevron-right"></i></div>
    </a>
    
    <!-- TikTok -->
    <a href="https://www.tiktok.com/@skypeepremium" target="_blank" rel="noopener noreferrer" class="social-link">
      <div class="link-left">
        <i class="fab fa-tiktok"></i>
        <span class="platform-name">TikTok</span>
      </div>
      <div class="arrow-icon"><i class="fas fa-chevron-right"></i></div>
    </a>
    
    <!-- Instagram -->
    <a href="https://instagram.com/skypeepremium" target="_blank" rel="noopener noreferrer" class="social-link">
      <div class="link-left">
        <i class="fab fa-instagram"></i>
        <span class="platform-name">Instagram</span>
      </div>
      <div class="arrow-icon"><i class="fas fa-chevron-right"></i></div>
    </a>
    
    <!-- Telegram -->
    <a href="https://t.me/skypeepremium" target="_blank" rel="noopener noreferrer" class="social-link">
      <div class="link-left">
        <i class="fab fa-telegram-plane"></i>
        <span class="platform-name">Telegram</span>
      </div>
      <div class="arrow-icon"><i class="fas fa-chevron-right"></i></div>
    </a>
  </div>
  
  <div class="footer-note">
    <span><i class="fas fa-shield-alt"></i> AMAN · CEPAT · LENGKAP · TERPERCAYA</span>
  </div>
</div>

</body>
</html>
