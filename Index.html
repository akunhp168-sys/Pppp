    .app{

    .header{

    .logo{
      width:75px;

      background:rgba(255,255,255,0.15);

    }

    .search{
      padding:15px;
      background:#1e293b;
    }

    .search input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      outline:none;
      background:#0f172a;
      color:white;
    }

    .menu{
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      background:#1e293b;
      padding:15px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      text-decoration:none;
      color:white;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.02);
      background:#334155;
    }

    .left{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .icon{
      width:55px;
      height:55px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      color:white;
    }

    .youtube{background:#ff0000;}

    .whatsapp{background:#25D366;}
    .discord{background:#5865F2;}
    .custom{background:#7c3aed;}

    .info h3{
